# Overture Maps → OpenLR attribute mapping.
# Pass --schema <path> to override.
#
# Rules are matched in order; first match wins.
# class = ""    is a catch-all (matches any class).
# subclass = "" matches any subclass (including absent).
#
# Validate class/subclass field names and flag names against the target
# Overture release transportation schema before each rebuild.
#
# FRC  0 (motorway/most important) … 7 (least important / non-vehicle)
# FOW  0=undefined  1=motorway  2=multiple_carriageway  3=single_carriageway
#      4=roundabout  5=traffic_square  6=slip_road  7=other

# ── motorway ──────────────────────────────────────────────────────────────────
[[rules]]
class = "motorway"
subclass = "link"
frc = 0
fow = 6

[[rules]]
class = "motorway"
subclass = ""
frc = 0
fow = 1

# ── trunk ─────────────────────────────────────────────────────────────────────
[[rules]]
class = "trunk"
subclass = "link"
frc = 1
fow = 6

[[rules]]
class = "trunk"
subclass = ""
frc = 1
fow = 3

# ── primary ───────────────────────────────────────────────────────────────────
[[rules]]
class = "primary"
subclass = "link"
frc = 1
fow = 6

[[rules]]
class = "primary"
subclass = ""
frc = 1
fow = 3

# ── secondary ─────────────────────────────────────────────────────────────────
[[rules]]
class = "secondary"
subclass = "link"
frc = 2
fow = 6

[[rules]]
class = "secondary"
subclass = ""
frc = 2
fow = 3

# ── tertiary ──────────────────────────────────────────────────────────────────
[[rules]]
class = "tertiary"
subclass = "link"
frc = 3
fow = 6

[[rules]]
class = "tertiary"
subclass = ""
frc = 3
fow = 3

# ── local / minor ─────────────────────────────────────────────────────────────
[[rules]]
class = "unclassified"
subclass = ""
frc = 4
fow = 3

[[rules]]
class = "residential"
subclass = ""
frc = 5
fow = 3

[[rules]]
class = "living_street"
subclass = ""
frc = 6
fow = 3

[[rules]]
class = "service"
subclass = ""
frc = 6
fow = 7
vehicular = false   # driveways, parking aisles, etc. — set true to include

# ── non-vehicle / other ───────────────────────────────────────────────────────
[[rules]]
class = "pedestrian"
subclass = ""
frc = 7
fow = 5
vehicular = false

[[rules]]
class = "track"
subclass = ""
frc = 7
fow = 7
vehicular = false   # farm/forestry tracks — set true to include

[[rules]]
class = "footway"
subclass = ""
frc = 7
fow = 7
vehicular = false

[[rules]]
class = "cycleway"
subclass = ""
frc = 7
fow = 7
vehicular = false

[[rules]]
class = "path"
subclass = ""
frc = 7
fow = 7
vehicular = false

[[rules]]
class = "steps"
subclass = ""
frc = 7
fow = 7
vehicular = false

[[rules]]
class = "bridleway"
subclass = ""
frc = 7
fow = 7
vehicular = false

[[rules]]
class = "construction"
subclass = ""
frc = 7
fow = 0
vehicular = false   # under construction — set true to include future roads

[[rules]]
class = ""
subclass = ""
frc = 7
fow = 0
vehicular = false   # catch-all: unknown classes are excluded

# ── Road-flag FOW overrides ───────────────────────────────────────────────────
# Applied after the class/subclass match. Valid road_flag values in this release:
#   is_bridge, is_link, is_tunnel, is_under_construction,
#   is_abandoned, is_covered, is_indoor
#
# is_link: overrides FOW → 6 (slip road). The top-level `subclass = "link"` rules
#   above are consistent with this; both yield FOW=6. is_link is the authoritative
#   source when the two disagree.
#
# Roundabout (FOW=4): not derivable from the current Overture schema. The valid
#   Subclass enum values are: link, sidewalk, crosswalk, parking_aisle, driveway,
#   alley, cycle_crossing — "roundabout" is not among them, and there is no
#   is_roundabout road flag. Roundabouts will decode as FOW=3 (single carriageway),
#   which is conservative but not incorrect for OpenLR matching purposes.
#   Revisit if Overture adds roundabout to its schema.
#
# Dual carriageway (FOW=2): no Overture flag or subclass exists for this. FOW=3
#   for trunk/primary is the safe default. Revisit if lane-count data is added.
[flag_overrides]
is_link = { fow = 6 }
